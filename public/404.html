<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Oops! - DrupalDataDotDev</title>
    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 116, 189, 0.5); }
            50% { box-shadow: 0 0 40px rgba(0, 201, 255, 0.8); }
        }
        
        @keyframes sparkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0E1B2A 0%, #1F2937 50%, #0E1B2A 100%);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
            color: #E5F1FF;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .container {
            text-align: center;
            max-width: 700px;
            padding: 2rem;
            position: relative;
            z-index: 2;
        }
        
        .error-code {
            font-size: 12rem;
            font-weight: bold;
            background: linear-gradient(135deg, #0074BD, #00C9FF, #B3D9FF);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite;
            margin: 0;
            line-height: 1;
            text-shadow: 0 0 30px rgba(0, 116, 189, 0.5);
        }
        
        .error-message {
            font-size: 2rem;
            margin: 1rem 0 2rem 0;
            color: #B3D9FF;
            font-weight: 600;
        }
        
        .description {
            font-size: 1.2rem;
            margin-bottom: 3rem;
            color: #E5F1FF;
            opacity: 0.9;
            line-height: 1.6;
        }
        
        .actions {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #0074BD 0%, #00C9FF 100%);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            animation: glow 2s ease-in-out infinite;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        
        .btn:hover::before {
            left: 100%;
        }
        
        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 116, 189, 0.4);
        }
        
        .btn-secondary {
            background: transparent;
            border: 2px solid #0074BD;
            color: #0074BD;
            animation: none;
        }
        
        .btn-secondary:hover {
            background: #0074BD;
            color: white;
            animation: glow 2s ease-in-out infinite;
        }
        
        .floating-elements {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .floating-element {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #00C9FF;
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }
        
        .floating-element:nth-child(1) { left: 10%; animation-delay: 0s; }
        .floating-element:nth-child(2) { left: 20%; animation-delay: 1s; }
        .floating-element:nth-child(3) { left: 30%; animation-delay: 2s; }
        .floating-element:nth-child(4) { left: 40%; animation-delay: 3s; }
        .floating-element:nth-child(5) { left: 50%; animation-delay: 4s; }
        .floating-element:nth-child(6) { left: 60%; animation-delay: 5s; }
        .floating-element:nth-child(7) { left: 70%; animation-delay: 0s; }
        .floating-element:nth-child(8) { left: 80%; animation-delay: 1s; }
        .floating-element:nth-child(9) { left: 90%; animation-delay: 2s; }
        
        .sparkle {
            position: absolute;
            font-size: 1.5rem;
            color: #00C9FF;
            animation: sparkle 2s ease-in-out infinite;
        }
        
        .sparkle:nth-child(1) { top: 20%; left: 15%; animation-delay: 0s; }
        .sparkle:nth-child(2) { top: 30%; right: 20%; animation-delay: 0.5s; }
        .sparkle:nth-child(3) { bottom: 30%; left: 25%; animation-delay: 1s; }
        .sparkle:nth-child(4) { bottom: 20%; right: 15%; animation-delay: 1.5s; }
        
        @media (max-width: 768px) {
            .error-code { font-size: 8rem; }
            .error-message { font-size: 1.5rem; }
            .description { font-size: 1rem; }
            .actions { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
    <div class="floating-elements">
        <div class="floating-element"></div>
        <div class="floating-element"></div>
        <div class="floating-element"></div>
        <div class="floating-element"></div>
        <div class="floating-element"></div>
        <div class="floating-element"></div>
        <div class="floating-element"></div>
        <div class="floating-element"></div>
        <div class="floating-element"></div>
        <div class="sparkle">✨</div>
        <div class="sparkle">💫</div>
        <div class="sparkle">⭐</div>
        <div class="sparkle">🌟</div>
    </div>
    
    <div class="container">
        <h1 class="error-code">404</h1>
        <h2 class="error-message">Oops! You've ventured into the void! 🚀</h2>
        <p class="description">
            Looks like this page decided to take a cosmic vacation! 
            Don't worry, even the best developers get lost in space sometimes. 
            Let's get you back to charting the data universe! 📊✨
        </p>
        <div class="actions">
            <a href="/" class="btn">🏠 Return to Base</a>
            <a href="/generator" class="btn">🚀 Launch Generator</a>
            <a href="/about" class="btn btn-secondary">🌌 About the Mission</a>
        </div>
    </div>
</body>
</html>
